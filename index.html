<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leistungsklasse Punkte</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937, #0f172a);
      color: #f9fafb;
      min-height: 100vh;
      padding: 16px;
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
    }
    header {
      padding: 18px 4px 14px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }
    .subtitle {
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .card {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      margin-bottom: 14px;
    }
    .team-row {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }
    .team-row:last-child { border-bottom: 0; }
    .team-name {
      font-weight: 650;
      font-size: 15px;
    }
    .team-note {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 2px;
    }
    input[type="number"] {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.45);
      border-radius: 14px;
      background: #020617;
      color: #fff;
      padding: 12px 10px;
      font-size: 18px;
      text-align: center;
      outline: none;
    }
    input[type="number"]:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #0f172a;
      background: #e5e7eb;
    }
    button.primary { background: #38bdf8; }
    button.danger { background: #fca5a5; }
    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th, td {
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }
    th {
      color: #cbd5e1;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    td.pos {
      width: 38px;
      color: #93c5fd;
      font-weight: 800;
    }
    td.points {
      text-align: right;
      font-weight: 800;
    }
    .hint {
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.45;
      margin-top: 10px;
    }
    @media print {
      body { background: #fff; color: #000; }
      .card { box-shadow: none; border: 1px solid #ddd; background: #fff; }
      .edit-card, .buttons, .hint, .subtitle { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Leistungsklasse</h1>
      <div class="subtitle">Mannschaften & Punkte – lokal gespeichert</div>
    </header>

    <section class="card edit-card">
      <div id="teamInputs"></div>
      <div class="buttons">
        <button class="primary" onclick="savePoints()">Speichern</button>
        <button class="danger" onclick="resetPoints()">Zurücksetzen</button>
      </div>
      <div class="hint">Die Mannschaften sind alphabetisch sortiert. Deine Änderungen bleiben auf diesem Gerät gespeichert.</div>
    </section>

    <section class="card">
      <table class="table">
        <thead>
          <tr>
            <th>Platz</th>
            <th>Mannschaft</th>
            <th style="text-align:right">Punkte</th>
          </tr>
        </thead>
        <tbody id="ranking"></tbody>
      </table>
    </section>
  </main>

  <script>
    const defaultTeams = [
      { name: "Breite Burschen Barmen", points: 8 },
      { name: "Cronenberger SC", points: 10 },
      { name: "SC Velbert", points: 10 },
      { name: "SSVg Velbert 02", points: 10 },
      { name: "SV Heckinghausen", points: 7 },
      { name: "TSV Einigkeit Dornap-Düssel", points: 7 },
      { name: "TuS Grün-Weiß 89/02", points: 10 },
      { name: "TVD Velbert", points: 8 },
      { name: "Union Velbert", points: 9 }
    ].sort((a, b) => a.name.localeCompare(b.name, "de"));

    const STORAGE_KEY = "lk_teams_points_v1";
    let teams = loadTeams();

    function loadTeams() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return structuredClone(defaultTeams);
      try {
        const parsed = JSON.parse(saved);
        return parsed.sort((a, b) => a.name.localeCompare(b.name, "de"));
      } catch {
        return structuredClone(defaultTeams);
      }
    }

    function renderInputs() {
      const box = document.getElementById("teamInputs");
      box.innerHTML = "";
      teams.forEach((team, index) => {
        const row = document.createElement("div");
        row.className = "team-row";
        row.innerHTML = `
          <div>
            <div class="team-name">${team.name}</div>
            <div class="team-note">Stärke/Punkte eintragen</div>
          </div>
          <input type="number" min="0" max="99" step="1" value="${team.points}" data-index="${index}" />
        `;
        box.appendChild(row);
      });
    }

    function renderRanking() {
      const tbody = document.getElementById("ranking");
      const sorted = [...teams].sort((a, b) => {
        if (b.points !== a.points) return b.points - a.points;
        return a.name.localeCompare(b.name, "de");
      });

      tbody.innerHTML = sorted.map((team, i) => `
        <tr>
          <td class="pos">${i + 1}</td>
          <td>${team.name}</td>
          <td class="points">${team.points}</td>
        </tr>
      `).join("");
    }

    function savePoints() {
      document.querySelectorAll("input[type='number']").forEach(input => {
        const index = Number(input.dataset.index);
        const value = Number(input.value || 0);
        teams[index].points = value;
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(teams));
      renderRanking();
    }

    function resetPoints() {
      if (!confirm("Alles auf die Startwerte zurücksetzen?")) return;
      teams = structuredClone(defaultTeams);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(teams));
      renderInputs();
      renderRanking();
    }

    renderInputs();
    renderRanking();
  </script>
</body>
</html>
